<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Suri Learning - Quiz Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#ea580c', dark: '#c2410c' },
            xp: '#58cc02', heart: '#ff4b4b',
            gem: '#ffc800', ai: '#a560f2',
            surface: '#f7f7f7',
            textPrimary: '#2d3436', textSecondary: '#636e72',
          },
          fontFamily: { heading: ['Space Grotesk','sans-serif'], body: ['Inter','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }
    .card-shadow { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .tap-btn { transition: all 0.15s ease; }
    .tap-btn:active { transform: scale(0.96); }
    .answer-selected { border-color: #3b82f6 !important; background: #eff6ff !important; }
    .answer-correct { border-color: #58cc02 !important; background: #dcfce7 !important; }
    .answer-wrong { border-color: #ff4b4b !important; background: #fee2e2 !important; }
    .timer-warning { animation: timerPulse 1s infinite; }
    @keyframes timerPulse { 0%,100%{color:#ff4b4b} 50%{color:#ef4444} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    @keyframes bounce { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.1);opacity:1} 100%{transform:scale(1);opacity:1} }
    @keyframes progressShrink { from{width:100%} to{width:0%} }
    .correct-bounce { animation: bounce 0.5s ease-out; }
    .wrong-shake { animation: shake 0.4s ease; }
    .xp-pop { animation: bounce 0.6s ease; color: #58cc02; }
  </style>
</head>
<body class="bg-surface min-h-screen max-w-md mx-auto">

  <!-- Top Bar -->
  <div class="bg-white px-4 pt-2 pb-3 sticky top-0 z-50">
    <div class="flex items-center justify-between mb-2">
      <!-- Hearts -->
      <div class="flex items-center gap-0.5">
        <svg class="w-6 h-6 text-heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="w-6 h-6 text-heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <svg class="w-6 h-6 text-gray-300" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </div>
      <!-- Timer -->
      <div class="flex items-center gap-2 bg-red-50 px-3 py-1 rounded-xl" id="timer-box">
        <svg class="w-5 h-5 text-heart" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span class="font-heading font-bold text-lg text-heart timer-warning" id="timer">00:30</span>
      </div>
      <!-- Skip -->
      <button class="text-textSecondary text-sm font-medium tap-btn flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        Bỏ qua
      </button>
    </div>
    <!-- Progress -->
    <div class="flex items-center gap-2">
      <span class="text-xs font-semibold text-textSecondary">3/10</span>
      <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden flex">
        <div class="h-full bg-gray-200 rounded-full" style="width:20%"></div>
        <div class="h-full bg-brand rounded-full" style="width:30%"></div>
        <div class="h-full bg-xp rounded-full" style="width:20%"></div>
      </div>
      <span class="text-xs font-semibold text-xp">+10 XP</span>
    </div>
  </div>

  <!-- Question Card -->
  <div class="px-4 pt-6 pb-32">

    <!-- Question -->
    <div class="bg-white rounded-3xl card-shadow p-6 mb-6 slide-up">
      <div class="flex items-center gap-2 mb-4">
        <span class="bg-orange-50 text-brand text-xs font-bold px-2 py-1 rounded-lg">IELTS Reading</span>
        <span class="bg-purple-50 text-ai text-xs font-bold px-2 py-1 rounded-lg">Vocabulary</span>
      </div>
      <h2 class="font-heading font-bold text-xl text-textPrimary leading-snug mb-2">
        "Smartphones have become <span class="text-brand italic">ubiquitous</span> in modern society."
      </h2>
      <p class="text-textSecondary text-base">What does the word <strong class="text-textPrimary">"ubiquitous"</strong> mean?</p>
    </div>

    <!-- Answer Options -->
    <div class="space-y-3" id="answers">
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="selectAnswer(this, false)" data-qid="1">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0 text-base">A</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary text-base">Brief</span>
          <span class="text-xs text-textSecondary block">Ngắn ngủi, tạm thời</span>
        </div>
      </button>
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="selectAnswer(this, false)" data-qid="1">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0 text-base">B</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary text-base">Found everywhere</span>
          <span class="text-xs text-textSecondary block">Có mặt ở khắp nơi</span>
        </div>
      </button>
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="selectAnswer(this, false)" data-qid="1">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0 text-base">C</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary text-base">Ancient</span>
          <span class="text-xs text-textSecondary block">Cổ xưa</span>
        </div>
      </button>
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="selectAnswer(this, false)" data-qid="1">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0 text-base">D</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary text-base">Expensive</span>
          <span class="text-xs text-textSecondary block">Đắt đỏ</span>
        </div>
      </button>
    </div>

    <!-- Hint Button -->
    <div class="mt-4 flex justify-between items-center">
      <button class="flex items-center gap-2 bg-yellow-50 text-yellow-700 text-sm font-medium px-3 py-2 rounded-xl tap-btn">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
        Dùng gợi ý (10 💎)
      </button>
      <button class="bg-brand text-white font-heading font-bold px-4 py-2 rounded-xl tap-btn text-sm">
        Tiếp tục
      </button>
    </div>

    <!-- Feedback Overlay (hidden) -->
    <div id="feedback" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
      <div class="bg-white rounded-3xl p-8 mx-6 text-center card-shadow max-w-sm w-full" id="feedback-card">
        <div id="feedback-icon" class="text-6xl mb-4"></div>
        <h3 id="feedback-title" class="font-heading font-bold text-2xl mb-2"></h3>
        <p id="feedback-text" class="text-textSecondary text-sm mb-4"></p>
        <div id="feedback-xp" class="inline-flex items-center gap-1 bg-green-50 text-xp font-bold text-lg px-4 py-2 rounded-xl mb-6"></div>
        <button class="w-full bg-xp text-white font-heading font-bold py-4 rounded-2xl shadow-md tap-btn text-lg" onclick="nextQuestion()">
          Tiếp theo →
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-4 z-40">
    <div class="flex justify-around text-center">
      <div class="flex flex-col items-center">
        <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center mb-1">
          <svg class="w-5 h-5 text-brand" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <span class="text-xs font-semibold text-xp">3 Đúng</span>
      </div>
      <div class="flex flex-col items-center">
        <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center mb-1">
          <svg class="w-5 h-5 text-heart" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
        <span class="text-xs font-semibold text-heart">1 Sai</span>
      </div>
      <div class="flex flex-col items-center">
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center mb-1">
          <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        </div>
        <span class="text-xs font-semibold text-blue-500">00:18</span>
      </div>
    </div>
  </div>

  <script>
    let timeLeft = 30;
    const timerEl = document.getElementById('timer');
    const timerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 10) timerEl.parentElement.classList.add('timer-warning');
      timerEl.textContent = '00:' + String(timeLeft).padStart(2, '0');
      if (timeLeft <= 0) { clearInterval(timerInterval); }
    }, 1000);

    function selectAnswer(btn, isCorrect) {
      document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
      btn.classList.add('answer-selected');

      // Find correct answer (B = Everywhere)
      setTimeout(() => {
        if (btn.textContent.includes('Everywhere')) {
          btn.classList.add('answer-correct');
          showFeedback(true);
        } else {
          btn.classList.add('answer-wrong');
          document.querySelectorAll('.answer-btn').forEach(b => {
            if (b.textContent.includes('Everywhere')) b.classList.add('answer-correct');
          });
          showFeedback(false);
        }
      }, 400);
    }

    function showFeedback(correct) {
      const feedback = document.getElementById('feedback');
      const card = document.getElementById('feedback-card');
      feedback.classList.remove('hidden');

      if (correct) {
        document.getElementById('feedback-icon').textContent = '🎉';
        document.getElementById('feedback-title').textContent = 'Chính xác!';
        document.getElementById('feedback-title').className = 'font-heading font-bold text-2xl mb-2 text-xp';
        document.getElementById('feedback-text').textContent = '"Ubiquitous" = Có mặt ở khắp nơi. Bạn đã học được một từ mới!';
        document.getElementById('feedback-xp').innerHTML = '+10 XP ✨';
        card.classList.add('correct-bounce');
      } else {
        document.getElementById('feedback-icon').textContent = '😢';
        document.getElementById('feedback-title').textContent = 'Chưa đúng!';
        document.getElementById('feedback-title').className = 'font-heading font-bold text-2xl mb-2 text-heart';
        document.getElementById('feedback-text').textContent = '"Ubiquitous" = Có mặt ở khắp nơi. Đừng nản lòng, cố gắng tiếp nhé!';
        document.getElementById('feedback-xp').innerHTML = 'Mất 1 ❤️';
        card.classList.add('wrong-shake');
      }
    }

    function nextQuestion() {
      document.getElementById('feedback').classList.add('hidden');
      clearInterval(timerInterval);
      // In real app: load next question from Firebase
      alert('Đang tải câu hỏi tiếp theo...');
    }
  </script>
</body>
</html>
