<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Suri Learning - Vocabulary Flashcard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#ea580c', dark: '#c2410c' },
            xp: '#58cc02', xpDark: '#46a302',
            heart: '#ff4b4b', gem: '#ffc800',
            ai: '#a560f2', aiDark: '#7c3aed',
            surface: '#f7f7f7',
            card: '#ffffff',
            textPrimary: '#2d3436', textSecondary: '#636e72',
          },
          fontFamily: { heading: ['Space Grotesk','sans-serif'], body: ['Inter','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }
    h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }
    .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .card-shadow-lg { box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .flip-card { perspective: 1000px; }
    .flip-inner { transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
    .flipped .flip-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes correctAnim { 0%{transform:scale(1)} 50%{transform:scale(1.1) rotate(5deg)} 100%{transform:scale(1)} }
    @keyframes wrongAnim { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .slide-up { animation: slideUp 0.4s ease-out; }
    .correct { animation: correctAnim 0.5s ease-out; }
    .wrong { animation: wrongAnim 0.5s ease-out; }
    .tap-btn { transition: all 0.15s ease; }
    .tap-btn:active { transform: scale(0.96); }
    .answer-correct { background: #58cc02 !important; color: white !important; border-color: #58cc02 !important; }
    .answer-wrong { background: #ff4b4b !important; color: white !important; border-color: #ff4b4b !important; }
  </style>
</head>
<body class="bg-surface min-h-screen max-w-md mx-auto">

  <!-- Header -->
  <div class="bg-white px-4 pt-2 pb-3 flex items-center justify-between sticky top-0 z-50">
    <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center tap-btn">
      <svg class="w-5 h-5 text-textSecondary" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div class="flex-1 mx-3">
      <div class="flex justify-between text-xs font-semibold mb-1 px-1">
        <span class="text-textSecondary">Card 5 / 20</span>
        <span class="text-brand font-bold">25%</span>
      </div>
      <div class="h-2.5 bg-gray-100 rounded-full overflow-hidden">
        <div class="h-full bg-brand rounded-full transition-all" style="width:25%"></div>
      </div>
    </div>
    <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center tap-btn">
      <svg class="w-5 h-5 text-textSecondary" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    </button>
  </div>

  <!-- Main Content -->
  <div class="px-4 pt-6 pb-32">

    <!-- Flashcard -->
    <div class="flip-card w-full h-64 mb-8" id="flipCard">
      <div class="flip-inner relative w-full h-full">
        <!-- Front -->
        <div class="flip-front absolute inset-0 bg-white rounded-3xl card-shadow-lg flex flex-col items-center justify-center p-6 cursor-pointer" onclick="this.parentElement.parentElement.classList.toggle('flipped')">
          <div class="absolute top-4 right-4 text-xs text-textSecondary bg-gray-50 px-2 py-1 rounded-lg">adj.</div>
          <div class="text-3xl font-heading font-bold text-textPrimary mb-2 text-center leading-tight">UBIQUITOUS</div>
          <div class="text-base text-textSecondary mb-4">/juːˈbɪkwɪtəs/</div>
          <div class="flex items-center gap-1 text-textSecondary text-sm mb-6">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15.536a5 5 0 001.414 1.414m2.828-9.9a9 9 0 0112.728 0"/></svg>
            <span>Tap to flip</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="bg-orange-50 text-brand text-xs font-semibold px-3 py-1 rounded-full">IELTS</span>
            <span class="bg-purple-50 text-ai text-xs font-semibold px-3 py-1 rounded-full">Advanced</span>
          </div>
          <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-1 text-brand">
            <svg class="w-4 h-4 animate-bounce" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
            <svg class="w-4 h-4 animate-bounce" fill="currentColor" viewBox="0 0 24 24" style="animation-delay:0.15s"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
            <svg class="w-4 h-4 animate-bounce" fill="currentColor" viewBox="0 0 24 24" style="animation-delay:0.3s"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
          </div>
        </div>
        <!-- Back -->
        <div class="flip-back absolute inset-0 bg-gradient-to-br from-brand to-brand-dark rounded-3xl card-shadow-lg flex flex-col items-center justify-center p-6 text-white cursor-pointer" onclick="this.parentElement.parentElement.classList.toggle('flipped')">
          <div class="text-sm font-semibold mb-2 opacity-80">Nghĩa tiếng Việt</div>
          <div class="text-2xl font-heading font-bold mb-4 text-center">Có mặt khắp nơi, ở khắp nơi</div>
          <div class="bg-white/20 rounded-xl p-3 w-full">
            <div class="text-xs opacity-70 mb-1">Ví dụ:</div>
            <div class="text-sm italic">"Smartphones have become <span class="font-bold text-yellow-200">ubiquitous</span> in modern society."</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Example Sentences Tabs -->
    <div class="bg-white rounded-2xl card-shadow mb-6 overflow-hidden">
      <div class="flex border-b border-gray-100">
        <button class="flex-1 py-3 text-sm font-semibold text-brand border-b-2 border-brand" id="tab-en">English</button>
        <button class="flex-1 py-3 text-sm font-medium text-textSecondary" id="tab-vi">Tiếng Việt</button>
        <button class="flex-1 py-3 text-sm font-medium text-textSecondary" id="tab-ex">Ví dụ</button>
      </div>
      <div class="p-4 min-h-[80px]" id="sentence-content">
        <p class="text-sm text-textPrimary leading-relaxed">"Mobile phones have become <span class="font-bold text-brand">ubiquitous</span> in today's world."</p>
      </div>
    </div>

    <!-- Hint Section -->
    <div class="flex items-center justify-between mb-6 px-1">
      <button class="flex items-center gap-1 text-textSecondary text-sm tap-btn" onclick="showHint()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        Gợi ý
      </button>
      <div class="flex items-center gap-1">
        <svg class="w-4 h-4 text-gem" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
        <span class="text-xs text-textSecondary">10 gems</span>
      </div>
    </div>

    <!-- Answer Buttons -->
    <div class="space-y-3">
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="checkAnswer(this, true)" data-correct="false">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0">A</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary">Brief</span>
          <span class="text-xs text-textSecondary block">— Ngắn ngủi</span>
        </div>
      </button>
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="checkAnswer(this, false)">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0">B</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary">Everywhere</span>
          <span class="text-xs text-textSecondary block">— Ở khắp nơi ✓</span>
        </div>
      </button>
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="checkAnswer(this, false)">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0">C</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary">Unique</span>
          <span class="text-xs text-textSecondary block">— Độc đáo</span>
        </div>
      </button>
      <button class="answer-btn w-full bg-white rounded-2xl py-4 px-5 card-shadow flex items-center gap-4 tap-btn text-left border-2 border-transparent" onclick="checkAnswer(this, false)">
        <span class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center font-heading font-bold text-textSecondary flex-shrink-0">D</span>
        <div class="flex-1">
          <span class="font-semibold text-textPrimary">Complex</span>
          <span class="text-xs text-textSecondary block">— Phức tạp</span>
        </div>
      </button>
    </div>

    <!-- Skip Button -->
    <div class="mt-4 text-center">
      <button class="text-textSecondary text-sm underline tap-btn" onclick="nextCard()">Bỏ qua →</button>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 p-4 flex items-center justify-between z-40">
    <button class="flex items-center gap-2 text-textSecondary text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
      Báo cáo lỗi
    </button>
    <button class="bg-xp text-white font-heading font-bold px-6 py-3 rounded-2xl shadow-md tap-btn flex items-center gap-2" onclick="nextCard()">
      Tiếp theo
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script>
    function checkAnswer(btn, isCorrect) {
      const allBtns = document.querySelectorAll('.answer-btn');
      allBtns.forEach(b => {
        b.disabled = true;
        b.classList.remove('tap-btn');
      });
      if (isCorrect) {
        btn.classList.add('answer-correct', 'correct');
      } else {
        btn.classList.add('answer-wrong', 'wrong');
        // Show correct answer
        allBtns.forEach(b => {
          if (b.textContent.includes('Everywhere')) b.classList.add('answer-correct');
        });
      }
    }
    function nextCard() {
      // In real app: load next card from Firebase
      alert('Đang tải từ tiếp theo... (kết nối Firebase)');
    }
    function showHint() {
      const content = document.getElementById('sentence-content');
      content.innerHTML = '<p class="text-sm text-ai font-medium">💡 Từ này thường dùng để mô tả công nghệ hoặc xu hướng phổ biến rộng rãi.</p>';
    }
    // Tab switching
    document.getElementById('tab-vi').onclick = function() {
      document.querySelectorAll('[id^=tab-]').forEach(t => { t.className = 'flex-1 py-3 text-sm font-medium text-textSecondary'; });
      this.className = 'flex-1 py-3 text-sm font-semibold text-brand border-b-2 border-brand';
      document.getElementById('sentence-content').innerHTML = '<p class="text-sm text-textPrimary">"Điện thoại di động đã trở nên <span class="font-bold text-brand">phổ biến khắp nơi</span> trong thế giới ngày nay."</p>';
    };
    document.getElementById('tab-ex').onclick = function() {
      document.querySelectorAll('[id^=tab-]').forEach(t => { t.className = 'flex-1 py-3 text-sm font-medium text-textSecondary'; });
      this.className = 'flex-1 py-3 text-sm font-semibold text-brand border-b-2 border-brand';
      document.getElementById('sentence-content').innerHTML = '<p class="text-sm text-textPrimary italic leading-relaxed">"The internet has become <span class="font-bold text-brand not-italic">ubiquitous</span> in modern life."<br><span class="text-xs text-textSecondary not-italic">— Internet đã trở nên phổ biến khắp nơi trong cuộc sống hiện đại.</span></p>';
    };
    document.getElementById('tab-en').onclick = function() {
      document.querySelectorAll('[id^=tab-]').forEach(t => { t.className = 'flex-1 py-3 text-sm font-medium text-textSecondary'; });
      this.className = 'flex-1 py-3 text-sm font-semibold text-brand border-b-2 border-brand';
      document.getElementById('sentence-content').innerHTML = '<p class="text-sm text-textPrimary leading-relaxed">"Mobile phones have become <span class="font-bold text-brand">ubiquitous</span> in today\'s world."</p>';
    };
  </script>
</body>
</html>
