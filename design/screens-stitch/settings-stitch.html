<style>

        .ios-toggle {
            position: relative;
            display: inline-block;
            width: 51px;
            height: 31px;
        }
        .ios-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #e5e5ea;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 27px;
            width: 27px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        input:checked + .slider {
            background-color: #a23800; /* Primary brand color from config */
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
